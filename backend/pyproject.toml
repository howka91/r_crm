[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    "migrations",
    "staticfiles",
    "media",
    ".venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "DJ",  # flake8-django
    "RUF", # ruff-specific
]
ignore = [
    "E501",   # line too long — handled by formatter
    "DJ001",  # null=True on string fields — sometimes intentional in legacy-aware schema
]

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E", "F", "I", "B", "UP", "SIM", "DJ", "RUF"]
"**/tests/*.py" = ["S101", "B008"]
"conftest.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "conf"]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "conf.settings.dev"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
addopts = [
    "--strict-markers",
    "--tb=short",
    "-ra",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: tests that require external services",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:django.*",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["apps"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__init__.py",
    "manage.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
